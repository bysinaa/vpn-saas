server {
    listen 80;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $realip_remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_connect_timeout 30s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    send_timeout 60s;

    # Health stays outside the API prefix and must remain unauthenticated.
    location = /health {
        access_log off;
        proxy_pass http://vpn_app/health;
    }

    location = /health/ready {
        access_log off;
        proxy_pass http://vpn_app/health/ready;
    }

    # Auth endpoints can be throttled more aggressively.
    location ~ ^/api/v1/auth/(login|register|refresh)$ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://vpn_app;
    }

    # Telegram webhook can tolerate higher burst traffic.
    location = /api/v1/telegram/webhook {
        limit_req zone=api_limit burst=100 nodelay;
        proxy_pass http://vpn_app;
    }

    # Main API.
    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass http://vpn_app;
    }

    # Future dashboard SPA.
    location /dashboard/ {
        proxy_pass http://vpn_app;
    }

    # Future CMS.
    location /cms/ {
        proxy_pass http://vpn_app;
    }

    # Default pass-through for future public/static routes.
    location / {
        proxy_pass http://vpn_app;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
}