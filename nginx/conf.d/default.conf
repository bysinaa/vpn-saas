server {
    listen 80;
    server_name _;

    # Redirect all HTTP to HTTPS (uncomment in production with TLS)
    # return 301 https://$host$request_uri;

    # ---- API ----
    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;

        proxy_pass http://vpn_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ---- Telegram webhook (higher rate limit tolerance) ----
    location /api/v1/telegram/webhook {
        limit_req zone=api_limit burst=100 nodelay;

        proxy_pass http://vpn_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Auth endpoints (stricter rate limit) ----
    location ~ ^/api/v1/auth/(login|register|refresh)$ {
        limit_req zone=auth_limit burst=10 nodelay;

        proxy_pass http://vpn_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Health check (no rate limit) ----
    location /health {
        access_log off;
        proxy_pass http://vpn_app;
        proxy_set_header Host $host;
    }

    # ---- Swagger docs (dev/staging only) ----
    location /api/docs {
        proxy_pass http://vpn_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Static files (Mini App) ----
    location /miniapp/ {
        root /var/www/miniapp;
        try_files $uri $uri/ /miniapp/index.html;
        add_header Cache-Control "no-cache";
    }

    # ---- Security headers ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

