services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: vpn-saas-app:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - '3000:3000'
    networks:
      - vpn-saas-network
    healthcheck:
      test: ['CMD-SHELL', 'wget --quiet --tries=1 --spider http://127.0.0.1:3000/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vpn_saas}
      POSTGRES_USER: ${POSTGRES_USER:-vpn_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-postgres-password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - '5433:5432'
    networks:
      - vpn-saas-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -h 127.0.0.1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes', '--maxmemory', '512mb', '--maxmemory-policy', 'allkeys-lru']
    volumes:
      - redis-data:/data
    ports:
      - '6379:6379'
    networks:
      - vpn-saas-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio-data:/data
    ports:
      - '9000:9000'
      - '9001:9001'
    networks:
      - vpn-saas-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://127.0.0.1:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx-certs:/etc/nginx/certs
    ports:
      - '80:80'
      - '443:443'
    networks:
      - vpn-saas-network
    healthcheck:
      test: ['CMD-SHELL', 'wget --quiet --tries=1 --spider http://127.0.0.1/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

networks:
  vpn-saas-network:
    name: vpn-saas-network
    driver: bridge

volumes:
  postgres-data:
    name: vpn-saas-postgres-data
  redis-data:
    name: vpn-saas-redis-data
  minio-data:
    name: vpn-saas-minio-data
  nginx-certs:
    name: vpn-saas-nginx-certs