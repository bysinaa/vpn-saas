version: '3.9'

services:
  # ---- Application ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vpn-saas-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?schema=public
      - REDIS_HOST=redis
      - S3_ENDPOINT=http://minio:9000
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - vpn-network
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    container_name: vpn-saas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-vpn_saas}
      POSTGRES_USER: ${DB_USER:-vpn_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vpn_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - '5433:5432'
    networks:
      - vpn-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-vpn_user} -d ${DB_NAME:-vpn_saas}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: vpn-saas-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - '6379:6379'
    networks:
      - vpn-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- MinIO (S3-compatible storage) ----
  minio:
    image: minio/minio:latest
    container_name: vpn-saas-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    ports:
      - '9000:9000'
      - '9001:9001'
    networks:
      - vpn-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

  # ---- NGINX Reverse Proxy ----
  nginx:
    image: nginx:alpine
    container_name: vpn-saas-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx-certs:/etc/nginx/certs
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      app:
        condition: service_healthy
    networks:
      - vpn-network

networks:
  vpn-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
  nginx-certs:
